<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#3A2248"/>
      <stop offset="45%"  stop-color="#5C3D6B"/>
      <stop offset="100%" stop-color="#2A4F4D"/>
    </linearGradient>
    <radialGradient id="blob1" cx="75%" cy="20%" r="50%">
      <stop offset="0%"   stop-color="#7A9186" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#7A9186" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="15%" cy="85%" r="45%">
      <stop offset="0%"   stop-color="#C9908A" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#C9908A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="10%" cy="25%" r="35%">
      <stop offset="0%"   stop-color="#7A5490" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#7A5490" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Ambient blobs -->
  <ellipse cx="900" cy="125" rx="420" ry="380" fill="url(#blob1)"/>
  <ellipse cx="180" cy="535" rx="380" ry="340" fill="url(#blob2)"/>
  <ellipse cx="120" cy="158" rx="300" ry="260" fill="url(#blob3)"/>

  <!-- Decorative top rule -->
  <line x1="490" y1="158" x2="710" y2="158" stroke="rgba(245,237,248,0.18)" stroke-width="1"/>

  <!-- Sparkle top-left -->
  <g transform="translate(178,195)" fill="rgba(245,237,248,0.35)">
    <path d="M0-12 L2.2 -2.2 L12 0 L2.2 2.2 L0 12 L-2.2 2.2 L-12 0 L-2.2-2.2 Z"/>
  </g>
  <!-- Sparkle top-right -->
  <g transform="translate(1022,195)" fill="rgba(245,237,248,0.25)">
    <path d="M0-8 L1.5-1.5 L8 0 L1.5 1.5 L0 8 L-1.5 1.5 L-8 0 L-1.5-1.5 Z"/>
  </g>
  <!-- Small star bottom-right -->
  <g transform="translate(1060,435)" fill="rgba(196,168,212,0.3)">
    <path d="M0-5 L1-1 L5 0 L1 1 L0 5 L-1 1 L-5 0 L-1-1 Z"/>
  </g>
  <!-- Small star left -->
  <g transform="translate(140,390)" fill="rgba(168,189,181,0.25)">
    <path d="M0-6 L1.2-1.2 L6 0 L1.2 1.2 L0 6 L-1.2 1.2 L-6 0 L-1.2-1.2 Z"/>
  </g>

  <!-- Main title -->
  <text
    x="600" y="290"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="300"
    font-size="88"
    letter-spacing="10"
    fill="rgba(245,237,248,0.96)"
    text-anchor="middle"
  >PRISMATIC</text>

  <text
    x="600" y="378"
    font-family="Georgia, 'Times New Roman', serif"
    font-weight="300"
    font-size="88"
    letter-spacing="10"
    fill="rgba(245,237,248,0.96)"
    text-anchor="middle"
  >INTEGRATION</text>

  <!-- Divider rule -->
  <line x1="490" y1="412" x2="710" y2="412" stroke="rgba(245,237,248,0.18)" stroke-width="1"/>

  <!-- Tagline -->
  <text
    x="600" y="456"
    font-family="Georgia, 'Times New Roman', serif"
    font-style="italic"
    font-weight="300"
    font-size="24"
    letter-spacing="1"
    fill="rgba(245,237,248,0.65)"
    text-anchor="middle"
  >Trauma-informed somatic care rooted in accessibility and community</text>

  <!-- Location -->
  <text
    x="600" y="498"
    font-family="Arial, Helvetica, sans-serif"
    font-weight="400"
    font-size="14"
    letter-spacing="4"
    fill="rgba(245,237,248,0.38)"
    text-anchor="middle"
  >ALBUQUERQUE, NEW MEXICO</text>

  <!-- Bottom rule -->
  <line x1="490" y1="472" x2="710" y2="472" stroke="rgba(245,237,248,0.1)" stroke-width="1"/>
</svg>
